name: Desktop Publish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Install WebAssembly tools
        run: dotnet workload install wasm-tools

      - name: Publish (Browser, net9.0-browser)
        run: dotnet publish WebTranslator/WebTranslator.Browser -c Release -f net9.0-browser -o ./publish

      - name: Upload Browser Build
        uses: actions/upload-artifact@v7
        with:
          name: WebTranslator-browser
          path: publish/wwwroot
          compression-level: 0

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      # Optional: Add MsBuild to the PATH (not strictly required for dotnet publish)
      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v3

      - name: Publish (Windows, net9.0, AOT, self-contained)
        run: >-
          dotnet publish WebTranslator/WebTranslator.Desktop
          -c Release
          -f net9.0
          -r win-x64
          -p:PublishAot=true
          -p:SelfContained=true
          -o ./publish

      - name: Rename and Clean Windows Files
        shell: pwsh
        run: |
          if (Test-Path publish/WebTranslator.Desktop.exe) {
            Move-Item -Path publish/WebTranslator.Desktop.exe -Destination publish/WebTranslator.exe -Force
          }
          Get-ChildItem publish -Include *.pdb,*.dbg -File -ErrorAction SilentlyContinue | Remove-Item -Force
          Remove-Item publish/av_libglesv2.dll,publish/libHarfBuzzSharp.dll,publish/libSkiaSharp.dll -Force -ErrorAction SilentlyContinue
          $extraDlls = Get-ChildItem publish -Filter *.dll -File -ErrorAction SilentlyContinue
          if ($extraDlls) {
            $extraDlls | ForEach-Object { Write-Host "Unexpected Windows publish DLL: $($_.Name)" }
            exit 1
          }

      - name: Upload Windows Build
        uses: actions/upload-artifact@v7
        with:
          name: WebTranslator-windows_amd64
          path: publish/WebTranslator.exe
          compression-level: 0

  build-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Install dependencies (AOT prerequisites)
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish (Linux, net9.0, AOT, self-contained)
        run: >-
          dotnet publish WebTranslator/WebTranslator.Desktop
          -c Release
          -f net9.0
          -r linux-x64
          -p:PublishAot=true
          -p:SelfContained=true
          -o ./publish

      - name: Rename and Clean Ubuntu Files
        run: |
          if [ -f publish/WebTranslator.Desktop ]; then mv publish/WebTranslator.Desktop publish/WebTranslator; fi
          chmod +x publish/WebTranslator
          rm -f publish/*.pdb publish/*.dbg || true

      - name: Upload Ubuntu Build
        uses: actions/upload-artifact@v7
        with:
          name: WebTranslator-linux_amd64
          path: publish/WebTranslator
          compression-level: 0

  release:
    needs: [build-browser, build-windows, build-ubuntu]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Windows Build
        uses: actions/download-artifact@v8
        with:
          name: WebTranslator-windows_amd64
          path: release/windows

      - name: Download Ubuntu Build
        uses: actions/download-artifact@v8
        with:
          name: WebTranslator-linux_amd64
          path: release/ubuntu

      - name: Download Browser Build
        uses: actions/download-artifact@v8
        with:
          name: WebTranslator-browser
          path: release/browser

      - name: Create release files
        run: |
          mkdir -p release/assets
          cp release/windows/WebTranslator.exe release/assets/WebTranslator-windows_amd64.exe
          cp release/ubuntu/WebTranslator release/assets/WebTranslator-linux_amd64
          chmod +x release/assets/WebTranslator-linux_amd64

      - name: Create release notes
        run: |
          previous_tag="$(git describe --tags --abbrev=0 --match 'publish-*' 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            git log --pretty=format:'- %s (%h)' "${previous_tag}..HEAD" > release-notes.md
          else
            git log --pretty=format:'- %s (%h)' > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "- No commits since the previous publish release." > release-notes.md
          fi

      - name: Deploy Browser to GitHub Pages Repository
        env:
          GH_TOKEN: ${{ secrets.CFPATools_Token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/CFPATools/cfpatools.github.io --depth=1 ../gh-pages
          cd ../gh-pages

          find . -type f ! -path './.git*' ! -name '.nojekyll' ! -name 'README.md' -delete
          find . -type d ! -path . ! -path './.git*' ! -path './.git/*' -exec rm -rf {} +

          cp -r "${GITHUB_WORKSPACE}/release/browser/." .

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Deploy updates $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin master
          else
            echo "No changes to commit."
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: publish-${{ github.run_number }}.${{ github.run_attempt }}
        run: |
          gh release create "$RELEASE_TAG" \
            release/assets/WebTranslator-windows_amd64.exe \
            release/assets/WebTranslator-linux_amd64 \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            --prerelease \
            --latest=false
